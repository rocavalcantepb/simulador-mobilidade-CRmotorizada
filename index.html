<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; font-family: Arial; text-align:center; }

#setup {
  padding:10px;
  background:#f0f0f0;
}

#game {
  width:100%;
  height:500px;
  background:#e5e5e5;
  position:relative;
  overflow:hidden;
  display:none;
}

#wheelchair {
  width:40px; height:40px;
  background:blue;
  border-radius:50%;
  position:absolute;
  top:50px; left:50px;
}

.obstacle {
  width:40px; height:40px;
  background:red;
  position:absolute;
  top:200px; left:150px;
}

#pedestrian {
  width:30px; height:30px;
  background:green;
  position:absolute;
  top:300px; left:-40px;
}

#house {
  width:60px; height:60px;
  background:brown;
  position:absolute;
  bottom:20px; right:20px;
}

#controls button {
  width:60px; height:60px;
  margin:5px; font-size:20px;
}

#info { margin:10px; }
</style>
</head>

<body>

<div id="setup">
  <h3>Avaliação Cognitivo-Motora</h3>
  Nome/ID: <input id="patient" placeholder="Ex: P01"><br><br>
  <button onclick="startGame()">▶️ Iniciar Avaliação</button>
</div>

<div id="info" style="display:none;">
⏱️ Tempo médio: <span id="avgReaction">0</span> ms |
❌ Erros: <span id="errors">0</span>
</div>

<div id="game">
  <div id="wheelchair"></div>
  <div class="obstacle"></div>
  <div id="pedestrian"></div>
  <div id="house"></div>
</div>

<div id="controls" style="display:none;">
<br>
<button onclick="move(0,-10)">↑</button><br>
<button onclick="move(-10,0)">←</button>
<button onclick="move(10,0)">→</button><br>
<button onclick="move(0,10)">↓</button>
</div>

<br>
<button onclick="downloadData()" style="display:none;" id="downloadBtn">📥 Baixar resultados</button>

<script>
let x = 50, y = 50;
let errors = 0;
let reactions = [];
let stopActive = false;
let startTime = 0;
let startSession = 0;
let patientID = "";

function startGame() {
  patientID = document.getElementById("patient").value || "anonimo";
  startSession = new Date();

  document.getElementById("setup").style.display = "none";
  document.getElementById("game").style.display = "block";
  document.getElementById("controls").style.display = "block";
  document.getElementById("info").style.display = "block";
  document.getElementById("downloadBtn").style.display = "inline";
}

// movimento
function move(dx, dy) {
  if (stopActive) {
    errors++;
    updateErrors();
    return;
  }

  x += dx;
  y += dy;

  let wc = document.getElementById("wheelchair");
  wc.style.left = x + "px";
  wc.style.top = y + "px";

  checkCollision();
  checkHouse();
}

// comando sonoro
setInterval(() => {
  if (!startSession) return;

  stopActive = true;
  startTime = Date.now();

  speechSynthesis.speak(new SpeechSynthesisUtterance("Pare"));

  setTimeout(() => {
    stopActive = false;
  }, 2000);

}, 7000);

// reação
document.addEventListener("keydown", () => {
  if (stopActive) {
    let reaction = Date.now() - startTime;
    reactions.push(reaction);
    updateAverage();
    stopActive = false;
  }
});

// pedestre
let ped = document.getElementById("pedestrian");

setInterval(() => {
  if (!startSession) return;

  let pos = -40;

  let interval = setInterval(() => {
    pos += 5;
    ped.style.left = pos + "px";

    if (pos > x - 20 && pos < x + 20 && y > 260 && y < 340 && !stopActive) {
      errors++;
      updateErrors();
    }

    if (pos > window.innerWidth) clearInterval(interval);

  }, 50);

}, 9000);

// colisão
function checkCollision() {
  if (x > 120 && x < 180 && y > 170 && y < 240) {
    errors++;
    updateErrors();
  }
}

// objetivo
function checkHouse() {
  if (x > window.innerWidth - 120 && y > 380) {
    alert("Avaliação concluída!");
  }
}

function updateErrors() {
  document.getElementById("errors").innerText = errors;
}

function updateAverage() {
  let avg = reactions.reduce((a,b)=>a+b,0) / reactions.length;
  document.getElementById("avgReaction").innerText = Math.round(avg);
}

// exportação
function downloadData() {

  let endSession = new Date();

  let csv = "paciente,inicio,fim,tempo_medio_ms,erros\n";

  let avg = reactions.length ? Math.round(reactions.reduce((a,b)=>a+b,0)/reactions.length) : 0;

  csv += ${patientID},${startSession.toISOString()},${endSession.toISOString()},${avg},${errors}\n\n;

  csv += "tentativa,tempo_reacao_ms\n";

  reactions.forEach((r,i)=>{
    csv += ${i+1},${r}\n;
  });

  let blob = new Blob([csv], { type: 'text/csv' });
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = avaliacao_${patientID}.csv;
  a.click();
}
</script>

</body>
</html>
