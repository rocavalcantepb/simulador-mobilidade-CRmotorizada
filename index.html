<!DOCTYPE html>
<html>
<head>

<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family: Arial; text-align:center; }

#setup { padding:10px; background:#f0f0f0; }

#game {
  width:100%;
  height:500px;
  background:#e5e5e5;
  position:relative;
  overflow:hidden;
  display:none;
}

#wheelchair {
  width:40px; height:40px;
  background:blue;
  border-radius:50%;
  position:absolute;
  top:50px; left:50px;
}

.obstacle {
  width:40px; height:40px;
  background:red;
  position:absolute;
  top:200px; left:150px;
}

#pedestrian {
  width:30px; height:30px;
  background:green;
  position:absolute;
  top:300px; left:-40px;
}

#house {
  width:60px; height:60px;
  background:brown;
  position:absolute;
  bottom:20px; right:20px;
}

#controls button {
  width:60px; height:60px;
  margin:5px; font-size:20px;
}

#info { margin:10px; }
</style>

</head>

<body>

<div id="setup">
  <h3>Simulação Condução CR MOTOR</h3>
  Nome/ID: <input id="patient" placeholder="Ex: P01"><br><br>
  <button onclick="startGame()">▶️ Iniciar Avaliação</button>
</div>

<div id="info" style="display:none;">
⏱️ Tempo médio: <span id="avgReaction">0</span> ms |
❌ Erros: <span id="errors">0</span>
</div>

<div id="game">
  <div id="wheelchair"></div>
  <div class="obstacle"></div>
  <div id="pedestrian"></div>
  <div id="house"></div>
</div>

<div id="controls" style="display:none;">
<br>
<button onclick="move(0,-10)">↑</button><br>
<button onclick="move(-10,0)">←</button>
<button onclick="move(10,0)">→</button><br>
<button onclick="move(0,10)">↓</button>
</div>

<br>
<button onclick="downloadData()" style="display:none;" id="downloadBtn">📥 Baixar resultados</button>

<script>
function startGame() {
  alert("FUNCIONOU");

  document.getElementById("setup").style.display = "none";
  document.getElementById("game").style.display = "block";
}
</script>

</body>
</html>
